function doGet(e){

  const sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("工作表1");

  const rows = sheet.getDataRange().getValues();

  const phone = (e.parameter.phone || "").trim();

  let latestData = null;
  let count = 0;

  for(let i=1;i<rows.length;i++){

    const rowPhone = String(rows[i][1]).trim();

    if(rowPhone === phone){

      count++;

      latestData = {
        name: rows[i][0],
        pet: rows[i][2],
        count: count
      };
    }
  }

  if(latestData){
    return ContentService
      .createTextOutput(JSON.stringify(latestData))
      .setMimeType(ContentService.MimeType.JSON);
  }

  return ContentService
    .createTextOutput(JSON.stringify({}))
    .setMimeType(ContentService.MimeType.JSON);
}
