<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>美容服務收據</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#FFF3E0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

.wrap{
  max-width:700px;
  margin:auto;
  padding:18px;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:22px;
  box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  color:#666;
  font-size:14px;
}

h2{
  margin-top:0;
  margin-bottom:10px;
}

#visitCount{
  color:#ff9800;
  font-weight:bold;
  margin-bottom:10px;
}

label{
  display:block;
  margin-top:14px;
  margin-bottom:6px;
  font-weight:600;
}

input,
select,
textarea{
  width:100%;
  border:1px solid #ddd;
  border-radius:14px;
  padding:13px;
  font-size:16px;
  outline:none;
}

input:focus,
select:focus,
textarea:focus{
  border-color:#ffb300;
}

button{
  width:100%;
  border:none;
  border-radius:16px;
  padding:15px;
  font-size:16px;
  cursor:pointer;
  margin-top:15px;
}

.signBtn{
  background:linear-gradient(180deg,#FFF3C4,#FFE08A);
}

.printBtn{
  background:#22c55e;
  color:#fff;
}

.printBtn:disabled{
  background:#bbb;
}

#status{
  margin-top:10px;
  color:#666;
}

.success{
  color:#16a34a;
  font-weight:bold;
}

@media print{

  body{
    background:#fff;
  }

  button{
    display:none;
  }

}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<div class="top">
<div id="today"></div>
<div id="receiptNo"></div>
</div>

<h2>美容服務收據</h2>

<div id="visitCount"></div>

<label>聯絡電話</label>
<input
id="phone"
placeholder="請輸入電話"
onchange="loadCustomer()">

<label>飼主姓名</label>
<input id="owner">

<label>寵物名字</label>
<input id="pet">

<label>服務內容</label>
<select id="service">
<option value="大美容">大美容</option>
<option value="小美容">小美容</option>
<option value="洗澡">洗澡</option>
<option value="剃毛">剃毛</option>
<option value="其他">其他</option>
</select>

<label>金額</label>
<input id="amount" type="number">

<label>備註</label>
<textarea id="note" rows="3"></textarea>

<button
class="signBtn"
id="signBtn">
客人簽名
</button>

<div id="status">
尚未簽名
</div>

<button
class="printBtn"
id="printBtn"
disabled>
列印收據
</button>

</div>

</div>

<script>
// ⭐ 一進來就判斷
localStorage.setItem("currentPhone", phone);

if (data.exists) {
  localStorage.setItem("isOldCustomer", "true");
} else {
  localStorage.setItem("isOldCustomer", "false");
}
const phone = localStorage.getItem("currentPhone");

// 👉 舊客直接跳走（完全跳過這頁）
if (isOldCustomer === "true") {
  window.location.href = "receipt.html?phone=" + phone;
}
  // ⭐ 自動帶入電話
window.onload = function() {
  const phone = localStorage.getItem("currentPhone");
  if (phone) {
    document.getElementById("phone").value = phone;
    loadCustomer(); // 自動查資料
  }
};
/* 改成你的 GAS 網址 */
const API_URL =
"https://script.google.com/macros/s/AKfycbzCMPUl2BR259zhmuKZIVC9DU8xeL99o_PuyayKzcuKjNomJj06W-vAPuL-yzvn_ZSoaQ/exec";

const printBtn =
document.getElementById("printBtn");

/* 日期 */
const now = new Date();

document.getElementById("today").innerText =
now.getFullYear() + "/" +
(now.getMonth()+1) + "/" +
now.getDate();

/* 收據編號 */
document.getElementById("receiptNo").innerText =
"NO." + Date.now().toString().slice(-6);

/* 自動讀取客戶 */
function loadCustomer(){

  const phone =
    document.getElementById("phone")
    .value
    .trim();

  if(!phone){
    return;
  }

  fetch(
    API_URL +
    "?phone=" +
    encodeURIComponent(phone)
  )

  .then(res => res.json())

  .then(data => {

    console.log(data);

    if(data.name){

      document.getElementById("owner").value =
        data.name || "";

      document.getElementById("pet").value =
        data.pet || "";

      if(data.count > 0){

        document.getElementById("visitCount")
        .innerText =
        "第 " + data.count + " 次來店";

      }else{

        document.getElementById("visitCount")
        .innerText =
        "首次來店";

      }

    }else{

      document.getElementById("visitCount")
      .innerText =
      "首次來店";

    }

  })

  .catch(err => {

    console.log(err);

    document.getElementById("visitCount")
    .innerText =
    "讀取失敗";

  });

}

/* 寫入試算表 */
function sendToSheet(){

  const data = {

    name:
      document.getElementById("owner")
      .value
      .trim(),

    phone:
      document.getElementById("phone")
      .value
      .trim(),

    pet:
      document.getElementById("pet")
      .value
      .trim(),

    service:
      document.getElementById("service")
      .value,

    amount:
      document.getElementById("amount")
      .value,

    note:
      document.getElementById("note")
      .value,

    date:
      new Date().toLocaleString()

  };

  fetch(API_URL,{

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify(data)

  })

  .then(res => res.text())

  .then(msg => {

    console.log(msg);

  })

  .catch(err => {

    console.log(err);

  });

}

/* 簽名 */
document.getElementById("signBtn")
.onclick = () => {

  document.getElementById("status")
  .innerHTML =
  "<span class='success'>已完成簽名 ✓</span>";

  printBtn.disabled = false;

};

/* 列印 */
printBtn.onclick = () => {

  sendToSheet();

  setTimeout(()=>{

    window.print();

  },500);

};

</script>

</body>
</html>
