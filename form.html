<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>契約資料填寫</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
  margin: 0;
  background: #f7f7f7;
  color: #333;
}

header {
  background: #ffffff;
  padding: 16px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  box-shadow: 0 2px 6px rgba(0,0,0,.06);
}

section {
  margin: 16px;
  background: #ffffff;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
}

.button {
  display: block;
  margin-top: 20px;
  padding: 14px;
  background: #06c755;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
}
</style>
</head>
<script>

document.getElementById("goForm").onclick = function(){

    // 取得目前電話
    const phone =
      localStorage.getItem("currentPhone");

    // 建立第一次來店紀錄
    const customerData = {
        agreed:true,
        createdAt:new Date().toLocaleString("zh-TW")
    };

    // 儲存客戶
    localStorage.setItem(
        phone,
        JSON.stringify(customerData)
    );

    // 跳到契約
    window.location.href = "contract.html";
};

</script>
<body>

<header>📝 契約資料填寫</header>

<section>
  <p>
    感謝您完成犬、貓美容服務定型化契約之閱讀與同意。<br><br>
    請點擊下方按鈕，前往填寫契約所需之基本資料。
  </p>

  <a class="button" id="goForm">
    前往填寫契約資料
  </a>
</section>

</body>
</html>
