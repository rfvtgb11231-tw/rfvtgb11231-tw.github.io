<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>美容服務收據</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#FFF3E0;
}
.wrap{
  padding:18px;
  max-width:700px;
  margin:auto;
}
.card{
  background:#fff;
  border-radius:18px;
  padding:18px;
  margin-bottom:18px;
}
label{
  font-weight:600;
  display:block;
  margin-top:12px;
  margin-bottom:6px;
}
input,select,textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
}
button.main{
  width:100%;
  padding:14px;
  border:none;
  border-radius:16px;
  background:linear-gradient(180deg,#FFF3C4,#FFE08A);
}
button.print{
  width:100%;
  padding:14px;
  border:none;
  border-radius:16px;
  background:#22c55e;
  color:#fff;
}
</style>
</head>

<body>

<div class="wrap">
<div class="card">

<h2>美容服務收據</h2>
<div id="visitCount" style="margin-top:6px;color:#666;font-size:14px;"></div>

<label>聯絡電話</label>
<input id="phone" onchange="loadCustomer()">

<label>飼主姓名</label>
<input id="owner">

<label>寵物名字</label>
<input id="pet">

<label>服務內容</label>
<select id="service">
<option value="大美容">大美容</option>
<option value="小美容">小美容</option>
<option value="其他">其他</option>
</select>

<label>金額</label>
<input id="amount" type="number">

<button class="main" id="openSign">客人簽名</button>
<div id="status">尚未簽名</div>

<button class="print" id="printBtn" disabled>列印收據</button>

</div>
</div>

<script>
const printBtn=document.getElementById("printBtn");

/* 自動帶客戶資料 */
function loadCustomer() {
  const phone = document.getElementById("phone").value;

  fetch("https://script.google.com/macros/s/AKfycbzCMPUl2BR259zhmuKZIVC9DU8xeL99o_PuyayKzcuKjNomJj06W-vAPuL-yzvn_ZSoaQ/exec?phone=" + phone)
    .then(res => res.json())
    .then(data => {
      if (data.name) {
        document.getElementById("owner").value = data.name;
        document.getElementById("pet").value = data.pet;

        if (data.count) {
          document.getElementById("visitCount").innerText = "第 " + data.count + " 次來店";
        } else {
          document.getElementById("visitCount").innerText = "首次來店";
        }
      } else {
        document.getElementById("visitCount").innerText = "";
      }
    });
}

/* 傳送資料 */
function sendToSheet() {
  const data = {
    name: document.getElementById("owner").value,
    phone: document.getElementById("phone").value,
    pet: document.getElementById("pet").value,
    amount: document.getElementById("amount").value,
    service: document.getElementById("service").value
  };

  fetch("https://script.google.com/macros/s/AKfycbzCMPUl2BR259zhmuKZIVC9DU8xeL99o_PuyayKzcuKjNomJj06W-vAPuL-yzvn_ZSoaQ/exec", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  printBtn.disabled=false;
}

/* 模擬簽名完成 */
document.getElementById("openSign").onclick = () => {
  document.getElementById("status").innerText = "已完成簽名 ✓";
  printBtn.disabled=false;
};

/* 列印 */
printBtn.onclick=()=>{
  sendToSheet();
  window.print();
};
</script>

</body>
</html>
